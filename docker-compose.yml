services:
  postgres:
    image: postgres:16-alpine
    container_name: trade-journal-db
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trade_journal
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
